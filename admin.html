<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
</head>
<body>

<h2>Create Location QR</h2>

<input id="name" placeholder="Venue">
<input id="lat" placeholder="Latitude">
<input id="lng" placeholder="Longitude">
<input id="points" placeholder="Points">

<button onclick="create()">Create</button>

<canvas id="qr"></canvas>

<script>
const supabase = supabase.createClient(
  "https://yykcwmxbhmpvhasgzygj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

async function create() {
  let code = "ZAR" + Math.random().toString(36).substring(7);

  await supabase.from("locations").insert({
    name: name.value,
    lat: parseFloat(lat.value),
    lng: parseFloat(lng.value),
    points: parseInt(points.value),
    code
  });

  QRCode.toCanvas(document.getElementById("qr"), code);
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <title>Zartour</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; background:#0f172a; color:white; margin:0; }

    .nav {
      display:flex;
      justify-content:space-around;
      background:#1e293b;
      padding:10px;
      position:fixed;
      bottom:0;
      width:100%;
    }

    .card {
      background:#1e293b;
      margin:10px;
      padding:10px;
      border-radius:10px;
    }

    #reader { width:300px; margin:auto; display:none; }
  </style>
</head>

<body>

<h2 id="username"></h2>
<p>Points: <span id="points">0</span></p>

<div id="feed"></div>

<div id="reader"></div>

<div class="nav">
  <button onclick="showFeed()">Feed</button>
  <button onclick="scan()">Scan</button>
  <button onclick="loadLeaderboard()">🏆</button>
</div>

<script>
const supabase = supabase.createClient(
  "https://yykcwmxbhmpvhasgzygj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

let userId;

// INIT AUTH
async function init() {
  let { data: { user } } = await supabase.auth.getUser();

  if (!user) {
    location.href = "auth.html";
    return;
  }

  userId = user.id;
  document.getElementById("username").innerText = user.email;

  await ensureProfile(user);
  loadPoints();
  loadFeed();
}

// PROFILE CHECK
async function ensureProfile(user) {
  let { data } = await supabase.from("users").select("*").eq("id", user.id);

  if (!data || data.length === 0) {
    let username = prompt("Choose username");

    await supabase.from("users").insert({
      id: user.id,
      email: user.email,
      username
    });
  }
}

// POINTS
async function loadPoints() {
  let { data } = await supabase.from("users").select("points").eq("id", userId);
  document.getElementById("points").innerText = data[0].points;
}

// FEED
async function loadFeed() {
  let { data } = await supabase.from("posts").select("*").order("created_at", {ascending:false});

  let html = "";
  data.forEach(p => {
    html += `<div class="card">${p.content}</div>`;
  });

  document.getElementById("feed").innerHTML = html;
}

// SCAN
function scan() {
  document.getElementById("reader").style.display = "block";

  const scanner = new Html5Qrcode("reader");

  scanner.start({ facingMode:"environment" }, { fps:10 },
    async (code) => {
      await scanner.stop();
      processScan(code);
    }
  );
}

// PROCESS SCAN + GEO CHECK
async function processScan(code) {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    let { data: loc } = await supabase.from("locations").select("*").eq("code", code);

    if (!loc.length) return alert("Invalid");

    let location = loc[0];

    let distance = Math.sqrt(
      Math.pow(lat - location.lat, 2) +
      Math.pow(lng - location.lng, 2)
    );

    if (distance > 0.01) {
      alert("Too far from location");
      return;
    }

    await supabase.from("scans").insert({
      user_id: userId,
      location_id: location.id
    });

    await supabase.rpc("increment_points", {
      uid: userId,
      pts: location.points
    });

    alert("Points awarded!");
    loadPoints();
  });
}

init();
</script>

</body>
</html>

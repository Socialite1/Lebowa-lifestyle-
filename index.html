<!DOCTYPE html>
<html>
<head>
  <title>Zartour App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:white; }

    .header {
      background:#16a34a;
      padding:20px;
      border-bottom-left-radius:20px;
      border-bottom-right-radius:20px;
    }

    .btn {
      background:#1e293b;
      padding:10px;
      margin:10px;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
    }

    .scan {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:orange;
      width:70px;
      height:70px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="header">
  <h2 id="username">Loading...</h2>
  <p>Points: <span id="points">0</span></p>
</div>

<div class="btn" onclick="goLeaderboard()">🏆 Leaderboard</div>

<div class="scan" onclick="scanQR()">📷</div>

<script>
const supabaseUrl = "YOUR_URL";
const supabaseKey = "YOUR_KEY";
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

let userId = null;

// INIT
async function init() {
  let { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    let email = prompt("Enter email");
    let password = prompt("Enter password");

    let { error } = await supabaseClient.auth.signUp({ email, password });

    if (error) {
      alert(error.message);
      return;
    }

    alert("Check your email!");
    return;
  }

  userId = user.id;
  document.getElementById("username").innerText = user.email;

  // Create user record if not exists
  let { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("id", userId)
    .maybeSingle();

  if (!data) {
    await supabaseClient.from("users").insert({
      id: user.id,
      email: user.email,
      points: 0
    });
  }

  loadPoints();
}

// LOAD POINTS
async function loadPoints() {
  let { data } = await supabaseClient
    .from("users")
    .select("points")
    .eq("id", userId)
    .single();

  if (data) {
    document.getElementById("points").innerText = data.points;
  }
}

// SCAN QR (CODE INPUT)
async function scanQR() {
  let code = prompt("Enter location code");

  if (!code) return;

  // Get location
  let { data: location } = await supabaseClient
    .from("locations")
    .select("*")
    .eq("code", code)
    .single();

  if (!location) {
    alert("Invalid code");
    return;
  }

  // Check if already scanned
  let { data: existing } = await supabaseClient
    .from("scans")
    .select("*")
    .eq("user_id", userId)
    .eq("location_id", location.id)
    .maybeSingle();

  if (existing) {
    alert("Already scanned this location");
    return;
  }

  // Save scan
  await supabaseClient.from("scans").insert({
    user_id: userId,
    location_id: location.id
  });

  // Add points
  let { data: user } = await supabaseClient
    .from("users")
    .select("points")
    .eq("id", userId)
    .single();

  let newPoints = (user.points || 0) + location.points;

  await supabaseClient
    .from("users")
    .update({ points: newPoints })
    .eq("id", userId);

  alert("+" + location.points + " points!");
  loadPoints();
}

// NAV
function goLeaderboard() {
  window.location.href = "leaderboard.html";
}

init();
</script>

</body>
</html>

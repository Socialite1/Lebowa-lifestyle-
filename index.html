<!DOCTYPE html>
<html>
<head>
  <title>Zartour App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body { font-family: Arial; margin:0; background:#0f172a; color:white; }

    .header {
      background:#16a34a;
      padding:20px;
      border-bottom-left-radius:20px;
      border-bottom-right-radius:20px;
    }

    .btn {
      background:#1e293b;
      padding:12px;
      margin:10px;
      border-radius:10px;
      text-align:center;
      cursor:pointer;
    }

    .scan {
      position:fixed;
      bottom:20px;
      left:50%;
      transform:translateX(-50%);
      background:orange;
      width:70px;
      height:70px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      cursor:pointer;
    }

    #reader {
      width:300px;
      margin:20px auto;
      display:none;
    }
  </style>
</head>

<body>

<div class="header">
  <h2 id="username">Loading...</h2>
  <p>Points: <span id="points">0</span></p>
</div>

<div class="btn" onclick="goLeaderboard()">🏆 Leaderboard</div>
<div class="btn" onclick="toggleScanner()">📷 Scan QR</div>

<div id="reader"></div>

<div class="scan" onclick="toggleScanner()">📷</div>

<script>
const supabaseClient = supabase.createClient(
  "https://yykcwmxbhmpvhasgzygj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl5a2N3bXhiaG1wdmhhc2d6eWdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDgxMjYsImV4cCI6MjA4OTkyNDEyNn0.p1rmjZvqSgpAVFj00FW5csffK6PXX1NrcAlWCQckRJ4"
);

let userId = null;
let scanner = null;
let scanning = false;

// INIT
async function init() {
  let { data: { user } } = await supabaseClient.auth.getUser();

  if (!user) {
    let email = prompt("Enter email");
    let password = prompt("Enter password");

    let { error } = await supabaseClient.auth.signUp({ email, password });

    if (error) {
      alert(error.message);
      return;
    }

    alert("Signup successful. Reload page.");
    return;
  }

  userId = user.id;
  document.getElementById("username").innerText = user.email;

  let { data } = await supabaseClient
    .from("users")
    .select("*")
    .eq("id", userId)
    .maybeSingle();

  if (!data) {
    await supabaseClient.from("users").insert({
      id: user.id,
      email: user.email,
      points: 0
    });
  }

  loadPoints();
}

// LOAD POINTS
async function loadPoints() {
  let { data } = await supabaseClient
    .from("users")
    .select("points")
    .eq("id", userId)
    .single();

  if (data) {
    document.getElementById("points").innerText = data.points;
  }
}

// TOGGLE SCANNER
function toggleScanner() {
  const reader = document.getElementById("reader");

  if (!scanning) {
    reader.style.display = "block";

    scanner = new Html5Qrcode("reader");

    scanner.start(
      { facingMode: "environment" },
      { fps: 10, qrbox: 250 },

      async (decodedText) => {
        await scanner.stop();
        scanning = false;
        reader.style.display = "none";
        processScan(decodedText);
      }
    );

    scanning = true;

  } else {
    scanner.stop();
    scanning = false;
    reader.style.display = "none";
  }
}

// PROCESS SCAN
async function processScan(code) {
  let { data: location } = await supabaseClient
    .from("locations")
    .select("*")
    .eq("code", code)
    .single();

  if (!location) {
    alert("Invalid QR Code");
    return;
  }

  let { data: existing } = await supabaseClient
    .from("scans")
    .select("*")
    .eq("user_id", userId)
    .eq("location_id", location.id)
    .maybeSingle();

  if (existing) {
    alert("Already scanned");
    return;
  }

  await supabaseClient.from("scans").insert({
    user_id: userId,
    location_id: location.id
  });

  let { data: user } = await supabaseClient
    .from("users")
    .select("points")
    .eq("id", userId)
    .single();

  let newPoints = (user.points || 0) + location.points;

  await supabaseClient
    .from("users")
    .update({ points: newPoints })
    .eq("id", userId);

  alert("🔥 +" + location.points + " points!");
  loadPoints();
}

// NAV
function goLeaderboard() {
  window.location.href = "leaderboard.html";
}

init();
</script>

</body>
</html>
